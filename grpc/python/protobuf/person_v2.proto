syntax = "proto3";

package tutorial.v2;

import "address.proto";
import "google/protobuf/wrappers.proto";

enum PhoneType {
  PHONE_TYPE_UNSPECIFIED = 0;
  PHONE_TYPE_MOBILE = 1;
  PHONE_TYPE_HOME = 2;
}

message Person {
  // Never reuse deleted tags or field names.
  reserved 2;
  reserved "age";

  string first_name = 1;
  tutorial.v1.Address address = 3;
  repeated string courses = 4;
  map<string, int32> course_grades = 5;
  PhoneType phone_type = 6;

  oneof identifier {
    string email = 7;
    string username = 8;
  }

  google.protobuf.Int32Value weight_kg = 9;

  // New fields get new tags.
  string date_of_birth = 10;
}
