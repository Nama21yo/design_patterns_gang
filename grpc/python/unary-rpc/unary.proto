syntax = "proto3";

package unary;

// Request message sent by the client.
message HelloRequest {
  string name = 1;
}

// Response message returned by the server.
message HelloReply {
  string message = 1;
}

// Service definition. This is the RPC surface exposed by the server.
service Greeter {
  // Unary RPC: one request in, one response out.
  rpc SayHello(HelloRequest) returns (HelloReply);
}
